<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>探險少年 — 主角造型草案 v2</title>
<style>
  body { background: #1a1c2c; color: #eee; font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 24px; }
  h1 { color: #7ec8ff; }
  p.lead { color: #cde; max-width: 760px; line-height: 1.7; }
  .row { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 24px; }
  .card { background: #24273a; border-radius: 12px; padding: 20px 24px; width: 320px; }
  .card h2 { margin: 0 0 4px; color: #ffd75e; font-size: 20px; }
  .card .tag { display: inline-block; background: #2d6a4f; color: #baffd0; border-radius: 4px; padding: 1px 8px; font-size: 12px; margin-left: 6px; vertical-align: middle; }
  .stage { background: linear-gradient(#2a3050, #171a2b); border: 1px solid #456; border-radius: 8px; display: flex; justify-content: center; align-items: flex-end; gap: 26px; padding: 18px 10px 12px; margin: 12px 0; }
  canvas { image-rendering: pixelated; }
  .desc { color: #cde; font-size: 14.5px; line-height: 1.8; }
  .pal { display: flex; gap: 6px; margin-top: 8px; }
  .pal span { width: 22px; height: 22px; border-radius: 4px; border: 1px solid #0006; display: inline-block; }
  .note { color: #9ab; font-size: 13px; margin-top: 28px; max-width: 760px; line-height: 1.7; }
</style>
</head>
<body>
<h1>🧭 探險少年 — 主角造型草案 v2(細節加強版)</h1>
<p class="lead">依你的回饋重畫:解析度提高到 22×30,加上輪廓線、雙層陰影、髮絲高光、護目鏡反光、皮帶、背包側影、圍巾垂尾。共同元素不變:棕髮、額上護目鏡、紅圍巾、小背包。左邊放大版,右邊接近遊戲內大小。</p>

<div class="row" id="cards"></div>

<p class="note">備註:站姿正面「造型定調」草案;選定後我會做側面跑步、落下(圍巾上飄)、受傷的動畫姿勢,進遊戲還會依各關光影微調。不滿意就再說方向,我繼續改。</p>

<script>
const MAP = [
"......##hhhh##........",
"....##hhhhhhhh##......",
"...#hhihhhhhhhhh#.....",
"..#hhiihhhhhhhhhh#....",
"..#hhihhhhhhhhhhh#....",
".#hhhhhhhhhhhhhhhh#...",
".#hHgggggggggggggH#...",
".#hGllLlgggllLlgGH#...",
".#hGllllgggllllgGH#...",
".#hHffffffffffffhH#...",
"..#ffffffffffffff#....",
"..#fexffffffffxef#....",
"..#feeffffffffeef#....",
"..#ffffffFFffffff#....",
"..#ffffwwwwwwffff#....",
"...#ffffffffffff#.....",
"..##rrrrrrrrrrrr##....",
".#qrrrrrrrrrrrrrr#....",
".#KkTttttttRRTkK#.....",
".#KkTtttttttRTkK#.....",
".#KkTttttttttTkK#.....",
"..#fTttttttttTf#......",
"..#ddddddddddddd#.....",
"..#pppppppppppp#......",
"..#pppppPPppppp#......",
"..#pppp#..#pppp#......",
"..#pppP#..#Pppp#......",
"..#bbbb#..#bbbb#......",
".#bbbbb#..#bbbbb#.....",
".#BBBBB#..#BBBBB#.....",
];

const COMMON = { f:"#f0c8a0", F:"#d4a87e", e:"#1d1610", x:"#ffffff", w:"#8a3c28" };

const VARIANTS = [
  {
    name: "A・經典探險裝",
    tag: "建議",
    desc: "卡其探險衣 + 深棕皮帶靴,金框護目鏡配天藍鏡片(帶反光),鮮紅圍巾垂在胸前。正統冒險家氣質,五關場景都百搭。",
    pal: Object.assign({}, COMMON, {
      "#":"#2a1a10", h:"#6b4a2b", H:"#543a20", i:"#8a6538",
      g:"#d9a441", G:"#a87828", l:"#7ecbe8", L:"#e8f8ff",
      r:"#d43d2a", R:"#a02a1c", q:"#f06848",
      t:"#c8a45a", T:"#a3843f", k:"#7a5c30", K:"#5c4322",
      d:"#5a3d26", p:"#6e4f30", P:"#54391e", b:"#3a2718", B:"#241708"
    })
  },
  {
    name: "B・活力橘藍",
    tag: "",
    desc: "藍色連帽運動衣 + 紅色運動鞋,銀框護目鏡配亮黃鏡片,橘紅圍巾。配色最鮮豔,在叢林、冰礦這種暗色關卡裡辨識度最高。",
    pal: Object.assign({}, COMMON, {
      "#":"#1a1622", h:"#8a5a33", H:"#6b4326", i:"#a87848",
      g:"#cfd6de", G:"#98a2ad", l:"#ffd75e", L:"#fff3c0",
      r:"#e8552e", R:"#b03a1e", q:"#ff8a5e",
      t:"#3a6ecf", T:"#2a4f9e", k:"#24437e", K:"#182f5a",
      d:"#20304e", p:"#2b3a5e", P:"#1e2a45", b:"#c8402e", B:"#8e2c1e"
    })
  },
  {
    name: "C・軍風大地",
    tag: "",
    desc: "軍綠野戰衣 + 灰棕長褲工作靴,銅框護目鏡配薄荷綠鏡片,暗紅圍巾。最硬派的探險隊風格,和礦坑、遺跡類場景特別合。",
    pal: Object.assign({}, COMMON, {
      "#":"#201a12", h:"#4a3320", H:"#362410", i:"#62462c",
      g:"#b07a3e", G:"#855a2a", l:"#b0e8c0", L:"#eafff2",
      r:"#b03028", R:"#7e1f1a", q:"#d05040",
      t:"#5a7a3a", T:"#435c2a", k:"#3c5226", K:"#2a3a1a",
      d:"#3a3226", p:"#6e6250", P:"#524838", b:"#463c2e", B:"#2e281e"
    })
  }
];

const w0 = MAP[0].length;
MAP.forEach((row, i) => { if (row.length !== w0) console.error(`Row ${i} length ${row.length} != ${w0}`); });

function draw(canvas, pal, scale) {
  const w = MAP[0].length, h = MAP.length;
  canvas.width = w; canvas.height = h;
  canvas.style.width = (w * scale) + "px";
  canvas.style.height = (h * scale) + "px";
  const ctx = canvas.getContext("2d");
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const c = MAP[y][x];
      if (c === ".") continue;
      ctx.fillStyle = pal[c] || "#ff00ff";
      ctx.fillRect(x, y, 1, 1);
    }
  }
}

const root = document.getElementById("cards");
VARIANTS.forEach(v => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<h2>${v.name}${v.tag ? `<span class="tag">${v.tag}</span>` : ""}</h2>
    <div class="stage"><canvas class="big"></canvas><canvas class="small"></canvas></div>
    <div class="desc">${v.desc}</div>
    <div class="pal">${["h","r","t","p","l"].map(k => `<span style="background:${v.pal[k]}"></span>`).join("")}</div>`;
  root.appendChild(card);
  draw(card.querySelector(".big"), v.pal, 9);
  draw(card.querySelector(".small"), v.pal, 2.5);
});
</script>
</body>
</html>
