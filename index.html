<title>地心大冒險</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#0f0c16;overflow:hidden}
  #wrap{position:fixed;left:0;top:0;right:0;bottom:0;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 42%,#1b1526 0%,#0f0c16 75%);
    touch-action:none;-webkit-user-select:none;user-select:none;cursor:pointer}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}

<div id="wrap"><canvas id="cv" width="360" height="640"></canvas></div>

'use strict';
/* ============ 地心大冒險 ============

   平台：普通(回血) / 尖刺(扣血) / 輸送帶 / 彈跳
   深度越深捲動越快，深度即分數。
==================================== */
const W = 360, H = 640;
const cv = document.getElementById('cv');
const wrap = document.getElementById('wrap');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ---- 版面自適應（維持 360x640 比例、像素縮放）----
function fit(){
  const s = Math.min(innerWidth / W, innerHeight / H);
  cv.style.width  = Math.floor(W * s) + 'px';
  cv.style.height = Math.floor(H * s) + 'px';
}
addEventListener('resize', fit); fit();

function C(){
  const t = currentTheme();
  return Object.assign({}, FIXED_C, t.colors);
}

const PW = 22, PH = 30;      // 角色碰撞盒
const MAX_HP = 10;

function themeIndexForDepth(depth){
  let idx = 0;
  for (let i = 0; i < THEMES.length; i++){
    if (depth >= THEMES[i].startDepth) idx = i;
  }
  return idx;
}
function currentTheme(){ return THEMES[themeIndexForDepth(depth)]; }
function depthInLevel(depth, theme){
  const span = theme.endDepth - theme.startDepth;
  return Math.max(0, Math.min(span, depth - theme.startDepth));
}
function isTeachingPhase(dInLevel){ return dInLevel < 30; }
function unlockedObstacleCount(theme, dInLevel){
  if (!isTeachingPhase(dInLevel)) return theme.obstacles.length;
  const per = 30 / theme.obstacles.length;
  return Math.max(1, Math.min(theme.obstacles.length, Math.floor(dInLevel / per) + 1));
}
function dangerProbFor(theme, dInLevel){
  if (dInLevel > 85) return theme.dangerProb[1];
  const t = dInLevel / 100;
  return theme.dangerProb[0] + (theme.dangerProb[1] - theme.dangerProb[0]) * t;
}
function pickPlatformCategory(theme, dInLevel, lastWasDanger){
  const unlocked = theme.obstacles.slice(0, unlockedObstacleCount(theme, dInLevel));
  const steppable = unlocked.filter(o => o.category !== 'flyer' && o.category !== 'faller');
  const dangerKinds = steppable.filter(o => o.category === 'crumble' || o.category === 'cycleDanger');
  const bounceKinds = steppable.filter(o => o.category === 'bounce');
  // 中性特殊平台(磁浮/傳送門等,不扣血也不彈跳,只是行為特殊):不計入危險機率統計
  const neutralKinds = steppable.filter(o => o.category !== 'crumble' && o.category !== 'cycleDanger' && o.category !== 'bounce');
  const totalDanger = dangerKinds.length ? dangerProbFor(theme, dInLevel) : 0;
  const perDanger = dangerKinds.length ? totalDanger / dangerKinds.length : 0;
  const bounceProb = bounceKinds.length ? 0.07 : 0;
  const neutralProb = neutralKinds.length ? 0.12 : 0;
  const r = Math.random();
  let acc = 0;
  if (!lastWasDanger){
    for (const o of dangerKinds){
      acc += perDanger;
      if (r < acc) return { category: o.category, obstacleKey: o.key };
    }
  }
  if (r < acc + bounceProb && bounceKinds.length){
    const o = bounceKinds[Math.floor(Math.random() * bounceKinds.length)];
    return { category: o.category, obstacleKey: o.key };
  }
  acc += bounceProb;
  if (r < acc + neutralProb && neutralKinds.length){
    const o = neutralKinds[Math.floor(Math.random() * neutralKinds.length)];
    return { category: o.category, obstacleKey: o.key };
  }
  return { category: 'norm', obstacleKey: null };
}
function shouldSpawnFlyer(theme, dInLevel){
  const unlocked = theme.obstacles.slice(0, unlockedObstacleCount(theme, dInLevel));
  const flyers = unlocked.filter(o => o.category === 'flyer');
  if (!flyers.length) return { spawn: false, obstacleKey: null };
  const prob = dangerProbFor(theme, dInLevel) * 0.5;
  if (Math.random() < prob){
    const o = flyers[Math.floor(Math.random() * flyers.length)];
    return { spawn: true, obstacleKey: o.key };
  }
  return { spawn: false, obstacleKey: null };
}

function tone(f0, f1, dur, type, vol){
  if(!AC) return;
  try{
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f0, t);
    o.frequency.linearRampToValueAtTime(f1, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(t); o.stop(t + dur);
  }catch(e){}
}
function chime(freqs, dur, type, vol){
  if(!AC) return;
  try{
    const t = AC.currentTime;
    freqs.forEach((f, i) => {
      const t0 = t + i * dur * 0.9;
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type;
      o.frequency.setValueAtTime(f, t0);
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      o.connect(g); g.connect(AC.destination);
      o.start(t0); o.stop(t0 + dur);
    });
  }catch(e){}
}

function noteFreq(m){ return m ? 440 * Math.pow(2, (m - 69) / 12) : 0; }
const TRACKS = {

const music = (() => {
  let playing = null, timer = null, stepIdx = 0, nextTime = 0;
  const lookahead = 25, scheduleAhead = 0.15;
  function playNote(freq, type, dur, t0, vol){
    if(!freq) return;
    try{
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(vol, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(AC.destination);
      o.start(t0); o.stop(t0 + dur);
    }catch(e){}
  }
  function scheduler(){
    const track = TRACKS[playing];
    if(!track) return;
    while(nextTime < AC.currentTime + scheduleAhead){
      const note = track.melody[stepIdx % track.melody.length];
      playNote(noteFreq(note), track.lead, track.stepDur * 0.94, nextTime, track.vol);
      if(stepIdx % track.bassEvery === 0){
        const bassNote = track.bassNotes[Math.floor(stepIdx / track.bassEvery) % track.bassNotes.length];
        playNote(noteFreq(bassNote), track.bass, track.stepDur * track.bassEvery * 0.85, nextTime, track.bassVol);
      }
      nextTime += track.stepDur;
      stepIdx++;
    }
  }
  function startScheduler(){
    stepIdx = 0;
    nextTime = AC.currentTime + 0.05;
    timer = setInterval(scheduler, lookahead);
  }
  function stop(){ if(timer){ clearInterval(timer); timer = null; } }
  function play(id){
    if(playing === id && timer) return;
    playing = id;
    stop();
    if(!musicEnabled || !AC) return;
    startScheduler();
  }
  function setEnabled(v){
    musicEnabled = v;
    try{ localStorage.setItem('downstairs-music', v ? '1' : '0'); }catch(e){}
    if(!v) stop();
    else if(playing && AC) startScheduler();
  }
  function ensureStarted(){
    if(musicEnabled && playing && !timer && AC) startScheduler();
  }
  return { play, stop, setEnabled, ensureStarted, get enabled(){ return musicEnabled; } };
})();

function spawn(y, forceNorm){
  const theme = currentTheme();

    category = pick.category; obstacleKey = pick.obstacleKey;
  }
  if (!forceNorm && category === 'norm' && theme.meltAll && Math.random() < 0.06) category = 'meltSlow';
  lastWasDanger = (category === 'crumble' || category === 'cycleDanger');
  const heartChance = Math.min(.03 + depth * .0005, .14);
  let heart = !forceNorm && category === 'norm' && Math.random() < heartChance;
  const coinChance = Math.min(.10 + depth * .0006, .30);
  const bigCoinChance = 0.02;
  let coin = null;
  if (!forceNorm && !heart && category !== 'flyer' && category !== 'portal' && Math.random() < coinChance){
    coin = Math.random() < bigCoinChance ? 'big' : 'small';
  }
  let x = x0;
  if (theme.isFinal && !altarSpawned && dInLevel >= 96){
    category = 'altar'; obstacleKey = null; heart = false; coin = null;
    w = W - 2 * WALL - 20; x = WALL + 10;
    altarSpawned = true;
  }
  plats.push({
    x, y, w, category, obstacleKey, heart, coin,
    dir: Math.random() < .5 ? -1 : 1, anim: Math.random() * 9, squash: 0, crumbleT: -1,
    moveSpeed: 30 + Math.random() * 20, portalCooldown: 0
  });

  if (flyCheck.spawn){

    const spMin = fcfg.speedMin || 40, spMax = fcfg.speedMax || 70;
    const dir = Math.random() < .5 ? -1 : 1;

    fliers.push({
      x: startX, y: y - GAP / 2,

// ---- 傷害 / 落地 / 結束 ----
function hurt(n){
  if(player.inv > 0) return;
  player.inv = 1.1;
  player.hp -= n;
  snd.hurt();
  if(player.hp <= 0){ player.hp = 0; gameOver(); }
}
function land(p){
  p.squash = .15;
  if (p.category === 'bounce'){
    player.vy = -560; player.stand = null; p.squash = .3;
    snd.spring();
    return;
  }
  player.stand = p; player.vy = 0; player.y = p.y - PH;
  if (p.category === 'crumble' && p.crumbleT < 0){ p.crumbleT = 0; p.meltDur = 0.8; }
  const theme = currentTheme();
  if (theme.meltAll && (p.category === 'norm' || p.category === 'meltSlow' || p.category === 'moving') && p.crumbleT < 0){
    p.crumbleT = 0;
    p.meltDur = p.category === 'meltSlow' ? theme.meltSeconds + 1.0 : theme.meltSeconds;
  }
  if (p.category === 'altar' && !hasWon){ hasWon = true; winT = 0; }
  if (p.category === 'cycleDanger'){
    const cfg = obstacleConfig(p);
    p._lastPhase = cyclePhase(p, cfg);
    if (p._lastPhase === 'danger') hurt(2); else snd.land();
  } else if (p.category !== 'bounce') {
    snd.land();
  }
}
function obstacleConfig(p){
  const theme = currentTheme();
  return theme.obstacles.find(o => o.key === p.obstacleKey) || {};
}
function cyclePhase(p, cfg){
  const total = (cfg.cycleSafe || 1.5) + (cfg.cycleWarn || 0.5) + (cfg.cycleDanger || 0.5);
  const t = p.anim % total;
  if (t < cfg.cycleSafe) return 'safe';
  if (t < cfg.cycleSafe + cfg.cycleWarn) return 'warn';
  return 'danger';
}
function gameOver(){
  state = 'over'; overAt = time;
  const finalDepth = Math.floor(depth);
  if (finalDepth > best){
    best = finalDepth; newBest = true;
    try{ localStorage.setItem('downstairs-best', String(best)); }catch(e){}
  }
  if (score > bestScore){
    bestScore = score; newBestScore = true;
    try{ localStorage.setItem('downstairs-best-score', String(bestScore)); }catch(e){}
  }
  snd.over();
  music.stop();
}
function finishWin(){
  victory = true;
  score += player.hp * 500;
  depth = THEMES[THEMES.length - 1].endDepth;
  state = 'over'; overAt = time;
  const finalDepth = Math.floor(depth);
  if (finalDepth > best){
    best = finalDepth; newBest = true;
    try{ localStorage.setItem('downstairs-best', String(best)); }catch(e){}
  }
  if (score > bestScore){
    bestScore = score; newBestScore = true;
    try{ localStorage.setItem('downstairs-best-score', String(bestScore)); }catch(e){}
  }
  snd.win();
  music.stop();
}

// ---- 更新 ----
function update(dt){
  time += dt;
  if (hasWon){
    winT += dt;
    if (winT > 2.5) finishWin();
    return;
  }
  scrollSpeed = Math.min(55 + depth * .62, 245);
  const sc = scrollSpeed * dt;
  scroll += sc;
  const prevDepth = depth;
  depth = scroll / 28;
  score += Math.floor(depth) - Math.floor(prevDepth) ? (Math.floor(depth) - Math.floor(prevDepth)) * 10 : 0;

  const themeIdx = themeIndexForDepth(depth);
  if (themeIdx !== lastThemeIndex){
    lastThemeIndex = themeIdx;
    bannerT = 2.5;
    snd.start();
    music.play(THEMES[themeIdx].id);
  }
  if (bannerT > 0) bannerT -= dt;

  for(const p of plats){
    p.y -= sc;
    p.anim += dt;
    if(p.squash > 0) p.squash -= dt;
    if(p.crumbleT >= 0){
      p.crumbleT += dt;
      if(p.crumbleT > p.meltDur && player.stand === p){
        player.stand = null; player.vy = 0;
      }
    }
    p._dx = 0;
    if(p.category === 'moving'){
      const prevX = p.x;
      p.x += p.dir * p.moveSpeed * dt;
      if(p.x < WALL){ p.x = WALL; p.dir = 1; }
      if(p.x > W - WALL - p.w){ p.x = W - WALL - p.w; p.dir = -1; }
      p._dx = p.x - prevX;
    }
    if(p.category === 'portal' && p.portalCooldown > 0) p.portalCooldown -= dt;
  }
  const theme = currentTheme();
  for(const f of fliers){
    f.y -= sc;
    f.anim += dt;
    const fcfg = theme.obstacles.find(o => o.key === f.obstacleKey) || {};
    f.x += f.dir * f.speed * dt;
    if (fcfg.sweep){
      if (f.x < WALL - 30 || f.x > W - WALL + 30) f.alive = false;
    } else {
      if(f.x < WALL){ f.x = WALL; f.dir = 1; }
      if(f.x > W - WALL - 16){ f.x = W - WALL - 16; f.dir = -1; }
    }
    if(f.alive && player.x < f.x + 14 && player.x + PW > f.x && player.y < f.y + 10 && player.y + PH > f.y){
      f.alive = false;
      hurt(2);
    }
  }
  fliers = fliers.filter(f => f.alive !== false && f.y > -30);

  // 墜落型危險物(冰柱/岩漿滴等):從天花板固定位置(畫面座標,不隨 scroll)先預警再墜落
  const fallerKinds = unlockedFallerKinds(theme, depthInLevel(depth, theme));
  if (fallerKinds.length){
    fallerCooldown -= dt;
    if (fallerCooldown <= 0){
      const o = fallerKinds[Math.floor(Math.random() * fallerKinds.length)];
      fallers.push({ x: WALL + 12 + Math.random() * (W - 2 * WALL - 24), y: CEIL_Y + 6, state: 'warn', t: 0, obstacleKey: o.key, vy: 0, alive: true });
      const dprob = dangerProbFor(theme, depthInLevel(depth, theme));
      fallerCooldown = Math.max(0.6, 2.0 - dprob * 3 + Math.random() * 0.8);
    }
  }
  for (const fa of fallers){
    fa.t += dt;
    if (fa.state === 'warn'){
      if (fa.t > 0.6){ fa.state = 'falling'; fa.t = 0; }
    } else {
      fa.vy = Math.min(fa.vy + 900 * dt, 520);
      fa.y += fa.vy * dt;
      if (fa.alive && player.x < fa.x + 8 && player.x + PW > fa.x - 8 && player.y < fa.y + 8 && player.y + PH > fa.y - 8){
        fa.alive = false;
        hurt(2);
      }
    }
  }
  fallers = fallers.filter(fa => fa.alive !== false && fa.y < H + 20);

  // 水平移動（鍵盤 + 觸控）
  const dir = inputDir();
  if(dir !== 0) player.face = dir;
  const onSlow = player.stand && player.stand.category === 'slow';
  let dx;
  if (onSlow){
    dx = dir * MOVE * 0.5 * dt;
    player.vx = dir * MOVE * 0.5;
  } else if (theme.iceSkate){
    const accel = 700, maxV = MOVE * 1.25, fric = 240;
    if (dir !== 0){
      player.vx = Math.max(-maxV, Math.min(maxV, player.vx + dir * accel * dt));
    } else if (player.vx !== 0){
      const sign = player.vx > 0 ? 1 : -1;
      player.vx -= sign * Math.min(Math.abs(player.vx), fric * dt);
    }
    dx = player.vx * dt;
  } else {
    player.vx = dir * MOVE;
    dx = dir * MOVE * dt;
  }
  player.x = Math.max(WALL, Math.min(W - WALL - PW, player.x + dx));
  player.moving = dir !== 0 || Math.abs(player.vx) > 5;
  if(player.moving) player.animT += dt;
  if(player.inv > 0) player.inv -= dt;

  // 站立狀態：跟著平台上移，走出邊緣就掉落
  if(player.stand){
    const p = player.stand;
    if (p.category === 'cycleDanger'){
      const cfg = obstacleConfig(p);
      const phase = cyclePhase(p, cfg);
      if (phase === 'danger' && p._lastPhase !== 'danger') hurt(2);
      p._lastPhase = phase;
    }
    if (p.category === 'moving' && p._dx){
      player.x = Math.max(WALL, Math.min(W - WALL - PW, player.x + p._dx));
    }
    if(p.y < CEIL_Y - 4 || player.x + PW <= p.x + 3 || player.x >= p.x + p.w - 3 || plats.indexOf(p) < 0){
      player.stand = null; player.vy = 0;
    } else {
      player.y = p.y - PH;
    }
  }

  // 下落與著地判定
  if(!player.stand){
    const prevBottom = player.y + PH;
    player.vy = Math.min(player.vy + GRAV * dt, MAXFALL);
    player.y += player.vy * dt;
    if(player.vy > 0){
      const bottom = player.y + PH;
      let landP = null, landY = 1e9;
      for(const p of plats){
        const pPrevY = p.y + sc;
        if(prevBottom <= pPrevY + 2 && bottom >= p.y &&
           player.x + PW > p.x + 3 && player.x < p.x + p.w - 3){
          if(p.y < landY){ landY = p.y; landP = p; }
        }
      }
      if(landP) land(landP);
    }
  }

  // 撿愛心補血
  for(const p of plats){
    if(!p.heart) continue;
    const hx = p.x + p.w / 2 - 7, hy = p.y - 18 + Math.sin(p.anim * 3) * 2;
    if(player.x < hx + 14 && player.x + PW > hx && player.y < hy + 12 && player.y + PH > hy){
      p.heart = false;
      player.hp = Math.min(MAX_HP, player.hp + 2);
      snd.heal();
    }
  }

  // 撿金幣
  for (const p of plats){
    if (!p.coin) continue;
    const cx = p.x + p.w / 2, cy = p.y - 12 + Math.sin(p.anim * 2.4) * 2;
    const r = p.coin === 'big' ? 7 : 5;
    if (player.x < cx + r && player.x + PW > cx - r && player.y < cy + r && player.y + PH > cy - r){
      score += p.coin === 'big' ? 500 : 100;
      coinsCollected++;
      snd.coin(p.coin === 'big');
      p.coin = null;
    }
  }

  // 傳送門:碰到門核心瞬間傳到畫面水平鏡像位置,保留下落速度(不當成落地處理)
  for (const p of plats){
    if (p.category !== 'portal' || p.portalCooldown > 0) continue;
    const cx = p.x + p.w / 2, cy = p.y - 4;
    const r = 11;
    if (player.x + PW > cx - r && player.x < cx + r && player.y + PH > cy - r && player.y < cy + r){
      player.x = Math.max(WALL, Math.min(W - WALL - PW, W - PW - player.x));
      p.portalCooldown = 1.0;
      snd.spring();
    }
  }

  // 尖刺天花板
  if(player.y < CEIL_Y){
    hurt(2);
    if(state !== 'play') return;
    player.stand = null; player.y = CEIL_Y + 2; player.vy = 260;
  }

  // 掉出畫面
  if(player.y > H + 10){ gameOver(); return; }

  // 清除已碎裂完的平台、離開頂部的平台，往下補新平台
  plats = plats.filter(p => !(p.crumbleT >= 0 && p.crumbleT >= p.meltDur + 0.3));
  plats = plats.filter(p => p.y > -30);
  let lowest = 0;
  for(const p of plats) lowest = Math.max(lowest, p.y);
  while(lowest < H + 40){ lowest += GAP; spawn(lowest); }
}

function drawWalls(){
  const theme = currentTheme();
  if (theme.id === 'city' && IMG.cityBg && IMG.cityBg.complete){
    const img = IMG.cityBg;
    const bw = img.width, bh = img.height;
    const scale = H / bh;
    const dw = bw * scale;
    const off = -((scroll * 0.3) % dw);
    for (let x = off - dw; x < W; x += dw) ctx.drawImage(img, x, 0, dw, H);
  } else if (theme.id === 'jungle' && IMG.jungleBg && IMG.jungleBg.complete){
    const img = IMG.jungleBg;
    const pat = ctx.createPattern(img, 'repeat');
    ctx.save();
    ctx.translate(-(scroll * 0.2 % img.width), -(scroll * 0.2 % img.height));
    ctx.fillStyle = pat;
    ctx.fillRect(0, 0, W + img.width, H + img.height);
    ctx.restore();
    if (IMG.jungleBgMid && IMG.jungleBgMid.complete){
      const mid = IMG.jungleBgMid;
      const midPat = ctx.createPattern(mid, 'repeat');
      ctx.save();
      ctx.translate(-(scroll * 0.35 % mid.width), -(140 + scroll * 0.35 % mid.height));
      ctx.fillStyle = midPat;
      ctx.fillRect(0, 0, W + mid.width, H + mid.height);
      ctx.restore();
    }
  } else if (theme.id === 'scifi' && IMG.scifiBgFar && IMG.scifiBgFar.complete){
    const img = IMG.scifiBgFar;
    const bw = img.width, bh = img.height;
    const scale = H / bh;
    const dw = bw * scale;
    const off = -((scroll * 0.15) % dw);
    for (let x = off - dw; x < W; x += dw) ctx.drawImage(img, x, 0, dw, H);
    if (IMG.scifiBgMid && IMG.scifiBgMid.complete){
      const mid = IMG.scifiBgMid;
      const mh = 140, mw = mid.width * (mh / mid.height);
      const moff = -((scroll * 0.3) % mw);
      for (let x = moff - mw; x < W; x += mw) ctx.drawImage(mid, x, H - mh, mw, mh);
    }
  } else if (theme.id === 'ice' && IMG.iceBg && IMG.iceBg.complete){
    const img = IMG.iceBg;
    const pat = ctx.createPattern(img, 'repeat');
    ctx.save();
    ctx.translate(-(scroll * 0.25 % img.width), -(scroll * 0.25 % img.height));
    ctx.fillStyle = pat;
    ctx.fillRect(0, 0, W + img.width, H + img.height);
    ctx.restore();
    ctx.fillStyle = 'rgba(14,26,42,0.45)';
    ctx.fillRect(0, 0, W, H);
  } else if (theme.id === 'lava' && IMG.iceBg && IMG.iceBg.complete){
    const img = IMG.iceBg;
    const pat = ctx.createPattern(img, 'repeat');
    ctx.save();
    ctx.translate(-(scroll * 0.25 % img.width), -(scroll * 0.25 % img.height));
    ctx.fillStyle = pat;
    ctx.fillRect(0, 0, W + img.width, H + img.height);
    ctx.restore();
    ctx.fillStyle = 'rgba(26,14,10,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'color';
    ctx.fillStyle = '#c04a1e';
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'source-over';
    const glow = 0.5 + Math.sin(time * 2) * 0.15;
    const grad = ctx.createLinearGradient(0, H - 120, 0, H);
    grad.addColorStop(0, 'rgba(255,110,40,0)');
    grad.addColorStop(1, `rgba(255,120,40,${0.45 * glow})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, H - 120, W, 120);
  } else {
    ctx.fillStyle = C().bg;
    ctx.fillRect(0, 0, W, H);
  }
  const wallKey = theme.id === 'city' ? 'cityWallTile' : theme.id === 'jungle' ? 'jungleWallTile' : null;
  if (wallKey && IMG[wallKey] && IMG[wallKey].complete){
    const img = IMG[wallKey];
    const pat = ctx.createPattern(img, 'repeat');
    ctx.save();
    ctx.translate(0, -(scroll % img.height));
    ctx.fillStyle = pat;
    ctx.fillRect(0, 0, WALL, H + img.height);
    ctx.fillRect(W - WALL, 0, WALL, H + img.height);
    ctx.restore();
  } else {
    ctx.fillStyle = C().wall;
    ctx.fillRect(0, 0, WALL, H);
    ctx.fillRect(W - WALL, 0, WALL, H);
  }
  if (theme.id === 'scifi'){
    const period = 48, off = -(scroll % period);
    ctx.fillStyle = 'rgba(78,232,255,0.55)';
    for (let sy = off - period; sy < H; sy += period){
      ctx.fillRect(WALL - 2, sy, 2, 22);
      ctx.fillRect(W - WALL, sy, 2, 22);
    }
  }
  ctx.fillStyle = C().wallHi;
  ctx.fillRect(WALL - 2, 0, 2, H);
  ctx.fillRect(W - WALL, 0, 2, H);
}

function drawPlat(p){
  const x = Math.round(p.x), y = Math.round(p.y), w = Math.round(p.w);
  const theme = currentTheme();
  if (p.category === 'crumble'){
    const cracked = p.crumbleT > 0.3;
    if (theme.id === 'jungle' && IMG.jungleBranch && IMG.jungleBranch.complete){
      ctx.save();
      if (cracked) ctx.translate((Math.random()-0.5)*2, 0);
      ctx.drawImage(IMG.jungleBranch, x, y - 5, w, PLAT_H + 10);
      ctx.restore();
      return;
    }
    ctx.fillStyle = 'rgba(200,220,255,0.35)';
    ctx.fillRect(x, y, w, PLAT_H);
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1;
    if (cracked){
      ctx.beginPath();
      ctx.moveTo(x + w * 0.3, y); ctx.lineTo(x + w * 0.5, y + PLAT_H);
      ctx.moveTo(x + w * 0.6, y); ctx.lineTo(x + w * 0.4, y + PLAT_H);
      ctx.stroke();
    }
    return;
  }
  if (p.category === 'cycleDanger'){
    const cfg = obstacleConfig(p);
    const phase = cyclePhase(p, cfg);
    if (theme.id === 'jungle' && IMG.jungleFlowerClosed && IMG.jungleFlowerClosed.complete){
      const img = phase === 'safe' ? IMG.jungleFlowerClosed : IMG.jungleFlowerOpen;
      ctx.drawImage(img, x, y, w, PLAT_H + 10);
      return;
    }
    if (p.obstacleKey === 'laserGate'){
      ctx.fillStyle = C().plat;
      ctx.fillRect(x, y, w, PLAT_H);
      ctx.fillStyle = C().platHi;
      ctx.fillRect(x, y, w, 2);
      if (phase !== 'safe'){
        const on = phase === 'danger';
        ctx.fillStyle = on ? 'rgba(255,61,110,0.95)' : 'rgba(255,180,80,0.6)';
        ctx.fillRect(x, y - 3, w, on ? 4 : 2);
        if (on){ ctx.fillStyle = 'rgba(255,180,200,0.7)'; ctx.fillRect(x, y - 4, w, 1); }
      }
      return;
    }
    if (p.obstacleKey === 'electricPanel'){
      ctx.fillStyle = C().plat;
      ctx.fillRect(x, y, w, PLAT_H);
      ctx.fillStyle = phase === 'danger' ? '#8ef0ff' : phase === 'warn' ? '#e0b13e' : C().platHi;
      ctx.fillRect(x, y, w, 2);
      if (phase !== 'safe'){
        const spin = (p.anim * (phase === 'danger' ? 14 : 6)) % 4;
        ctx.fillStyle = phase === 'danger' ? '#4ee8ff' : '#e0b13e';
        for (let sx = x + 6; sx + 4 <= x + w - 6; sx += 10) ctx.fillRect(sx, y + 4 + Math.sin(spin) * 2, 4, 4);
      }
      return;
    }
    const col = phase === 'danger' ? C().danger : phase === 'warn' ? '#e0b13e' : C().plat;
    ctx.fillStyle = col;
    ctx.fillRect(x, y, w, PLAT_H);
    ctx.fillStyle = C().platHi;
    ctx.fillRect(x, y, w, 2);
    if (phase !== 'safe'){
      const spin = (p.anim * (phase === 'danger' ? 12 : 6)) % 4;
      ctx.fillStyle = '#333';
      for (let sx = x + 6; sx + 4 <= x + w - 6; sx += 10) ctx.fillRect(sx, y + 4 + Math.sin(spin) * 2, 4, 4);
    }
    return;
  }
  if (p.category === 'moving'){
    const accent = p.obstacleKey === 'driftSlab' ? '#ff8a3d' : '#4ee8ff';
    ctx.fillStyle = p.obstacleKey === 'driftSlab' ? 'rgba(255,138,61,0.18)' : 'rgba(78,232,255,0.18)';
    ctx.fillRect(x - 2, y + PLAT_H, w + 4, 5);
    ctx.fillStyle = C().plat;
    ctx.fillRect(x, y, w, PLAT_H);
    ctx.fillStyle = accent;
    ctx.fillRect(x, y, w, 2);
    ctx.fillStyle = C().platLo;
    ctx.fillRect(x, y + PLAT_H - 2, w, 2);
    if (theme.meltAll && p.crumbleT >= 0){
      const t = Math.min(1, p.crumbleT / p.meltDur);
      ctx.fillStyle = `rgba(255,80,30,${0.15 + t * 0.55})`;
      ctx.fillRect(x, y, w, PLAT_H);
    }
    return;
  }
  if (p.category === 'portal'){
    ctx.fillStyle = C().plat;
    ctx.fillRect(x, y, w, PLAT_H);
    ctx.fillStyle = C().platHi;
    ctx.fillRect(x, y, w, 2);
    if (!(p.portalCooldown > 0)){
      const cx = x + w / 2, cy = y - 4;
      const spin = p.anim * 3;
      for (let i = 0; i < 3; i++){
        const rr = 9 - i * 2.5;
        ctx.strokeStyle = i % 2 === 0 ? 'rgba(200,150,255,0.85)' : 'rgba(120,80,220,0.6)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rr, rr * 0.7, spin + i, 0, 7);
        ctx.stroke();
      }
    }
    return;
  }
  if (p.category === 'slow'){
    ctx.fillStyle = C().plat;
    ctx.fillRect(x, y + 4, w, PLAT_H - 4);
    ctx.fillStyle = '#eaf6ff';
    ctx.beginPath();
    ctx.moveTo(x, y + 5);
    for (let sx = x; sx <= x + w; sx += 8) ctx.lineTo(sx + 4, sx % 16 === 0 ? y : y + 5);
    ctx.lineTo(x + w, y + 5); ctx.lineTo(x + w, y + PLAT_H); ctx.lineTo(x, y + PLAT_H);
    ctx.closePath(); ctx.fill();
    return;
  }
  if (p.category === 'bounce'){
    const sq = p.squash > 0 ? 4 : 0;
    if (theme.id === 'jungle' && IMG.jungleMushroom && IMG.jungleMushroom.complete){
      ctx.drawImage(IMG.jungleMushroom, x, y + sq - 6, w, PLAT_H - sq + 6);
      return;
    }
    if (theme.id === 'lava'){
      ctx.fillStyle = '#3a2418';
      ctx.fillRect(x, y + sq, w, PLAT_H - sq);
      ctx.fillStyle = '#8a4a20';
      ctx.fillRect(x, y + sq, w, 3);
      const puff = p.squash > 0 ? 1 : 0.5 + Math.sin(p.anim * 6) * 0.3;
      ctx.fillStyle = `rgba(255,200,140,${puff * 0.6})`;
      for (let sx = x + 6; sx + 4 <= x + w - 6; sx += 14) ctx.fillRect(sx, y + sq - 6 - puff * 6, 4, 6 + puff * 6);
      return;
    }
    ctx.fillStyle = '#c9853a';
    ctx.fillRect(x, y + sq, w, PLAT_H - sq);
    ctx.fillStyle = '#e8b06a';
    ctx.fillRect(x, y + sq, w, 3);
    ctx.fillStyle = '#8a5a24';
    for (let sx = x + 4; sx + 6 <= x + w; sx += 10) ctx.fillRect(sx, y + sq + 5, 6, 2);
    return;
  }
  if (p.category === 'altar'){
    ctx.fillStyle = '#3a3020';
    ctx.fillRect(x, y, w, PLAT_H + 2);
    ctx.fillStyle = '#ffd77a';
    ctx.fillRect(x, y, w, 3);
    const glow = 0.5 + Math.sin(p.anim * 2) * 0.3;
    ctx.fillStyle = `rgba(255,200,100,${glow})`;
    for (let sx = x + 10; sx + 6 <= x + w - 10; sx += 26) ctx.fillRect(sx, y + 6, 6, 3);
    return;
  }
  if (p.category === 'meltSlow'){
    ctx.fillStyle = '#5a5040';
    ctx.fillRect(x, y, w, PLAT_H);
    ctx.fillStyle = '#8a7a58';
    ctx.fillRect(x, y, w, 3);
    ctx.fillStyle = 'rgba(255,180,90,0.5)';
    for (let sx = x + 8; sx + 4 <= x + w - 8; sx += 18) ctx.fillRect(sx, y + 6, 4, 2);
    if (p.crumbleT >= 0){
      const t = Math.min(1, p.crumbleT / p.meltDur);
      ctx.fillStyle = `rgba(255,90,40,${0.15 + t * 0.5})`;
      ctx.fillRect(x, y, w, PLAT_H);
    }
    return;
  }
  // 普通磚塊平台
  ctx.fillStyle = C().plat;
  ctx.fillRect(x, y, w, PLAT_H);
  ctx.fillStyle = C().platHi;
  ctx.fillRect(x, y, w, 3);
  ctx.fillStyle = C().platLo;
  ctx.fillRect(x, y + PLAT_H - 2, w, 2);
  for(let sx = x + 12; sx < x + w - 3; sx += 16) ctx.fillRect(sx, y + 3, 2, PLAT_H - 5);
  if (theme.meltAll && p.crumbleT >= 0){
    const t = Math.min(1, p.crumbleT / p.meltDur);
    ctx.fillStyle = `rgba(255,80,30,${0.15 + t * 0.55})`;
    ctx.fillRect(x, y, w, PLAT_H);
    if (t > 0.6){
      ctx.fillStyle = `rgba(255,180,60,${(t - 0.6) * 1.6})`;
      ctx.fillRect(x, y + PLAT_H - 3, w, 3);
    }
  }
}
function drawFlier(f){
  if (f.obstacleKey === 'cart'){
    const x = Math.round(f.x), y = Math.round(f.y);
    ctx.fillStyle = '#8a95a8';
    ctx.fillRect(x, y, 22, 12);
    ctx.fillStyle = '#5a6478';
    ctx.fillRect(x, y, 22, 3);
    ctx.fillStyle = '#2a2e38';
    const spin = Math.floor(f.anim * 20) % 2;
    ctx.beginPath(); ctx.arc(x + 5, y + 13, 3, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 17, y + 13, 3, 0, 7); ctx.fill();
    ctx.fillStyle = spin === 0 ? '#ff3d6e' : '#a8203c';
    ctx.fillRect(x + (f.dir > 0 ? 18 : 0), y + 4, 3, 3);
    return;
  }
  const x = Math.round(f.x), y = Math.round(f.y + Math.sin(f.anim * 4) * 3);
  if (f.obstacleKey === 'wasp' && IMG.wasp && IMG.wasp.complete){
    ctx.drawImage(IMG.wasp, x, y, 16, 12);
    return;
  }
  if (f.obstacleKey === 'drone' && IMG.drone && IMG.drone.complete){
    ctx.drawImage(IMG.drone, x - 2, y - 2, 20, 19);
    return;
  }
  if (f.obstacleKey === 'iceBat' && IMG.iceBat && IMG.iceBat.complete){
    ctx.drawImage(IMG.iceBat, x - 4, y - 4, 20, 20);
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = 'rgba(90,170,255,0.35)';
    ctx.fillRect(x - 4, y - 4, 20, 20);
    ctx.globalCompositeOperation = 'source-over';
    return;
  }
  if (f.obstacleKey === 'fireSprite'){
    const flick = 0.6 + Math.sin(f.anim * 12) * 0.3;
    ctx.fillStyle = `rgba(255,120,40,${flick})`;
    ctx.beginPath(); ctx.arc(x + 6, y + 6, 6, 0, 7); ctx.fill();
    ctx.fillStyle = `rgba(255,210,110,${flick})`;
    ctx.beginPath(); ctx.arc(x + 6, y + 6, 3, 0, 7); ctx.fill();
    return;
  }
  const flap = Math.floor(f.anim * 8) % 2;
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(x + 4, y + 2, 8, 6);
  ctx.fillStyle = '#e8e8e8';
  if (flap === 0){
    ctx.fillRect(x, y, 4, 3);
    ctx.fillRect(x + 10, y, 4, 3);
  } else {
    ctx.fillRect(x + 1, y + 3, 4, 2);
    ctx.fillRect(x + 9, y + 3, 4, 2);
  }
}
function drawFaller(fa){
  const x = Math.round(fa.x);
  const lava = fa.obstacleKey === 'lavaDrip';
  const col = lava ? '#ff6a3d' : '#8ecdf0';
  const colHi = lava ? '#ffd7a0' : '#e8f8ff';
  if (fa.state === 'warn'){
    const glow = 0.4 + Math.sin(fa.t * 20) * 0.3;
    ctx.fillStyle = lava ? `rgba(255,106,61,${glow})` : `rgba(142,205,240,${glow})`;
    ctx.beginPath(); ctx.moveTo(x - 4, CEIL_Y + 4); ctx.lineTo(x + 4, CEIL_Y + 4); ctx.lineTo(x, CEIL_Y + 12); ctx.closePath(); ctx.fill();
    return;
  }
  const y = Math.round(fa.y);
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.moveTo(x - 4, y - 6); ctx.lineTo(x + 4, y - 6); ctx.lineTo(x, y + 6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = colHi;
  ctx.beginPath(); ctx.moveTo(x - 2, y - 5); ctx.lineTo(x + 1, y - 5); ctx.lineTo(x - 1, y); ctx.closePath(); ctx.fill();
}
const HEART = [
  '.hh.hh.',
  'hWhhhhh',
  'hhhhhhh',
  '.hhhhh.',
  '..hhh..',
  '...h...'
];
function drawHeart(p){
  const hx = Math.round(p.x + p.w / 2 - 7);
  const hy = Math.round(p.y - 18 + Math.sin(p.anim * 3) * 2);
  for(let r = 0; r < HEART.length; r++){
    for(let c = 0; c < HEART[r].length; c++){
      const ch = HEART[r][c];
      if(ch === '.') continue;
      ctx.fillStyle = ch === 'W' ? '#ffc9d4' : '#ff5a77';
      ctx.fillRect(hx + c * 2, hy + r * 2, 2, 2);
    }
  }
}
function drawCoin(p){
  const theme = currentTheme();
  const cx = Math.round(p.x + p.w / 2), cy = Math.round(p.y - 12 + Math.sin(p.anim * 2.4) * 2);
  const big = p.coin === 'big';
  const r = big ? 7 : 5;
  ctx.fillStyle = theme.coinPalette.lo;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill();
  ctx.fillStyle = theme.coinPalette.body;
  ctx.beginPath(); ctx.arc(cx, cy, r - 2, 0, 7); ctx.fill();
  ctx.fillStyle = theme.coinPalette.hi;
  ctx.beginPath(); ctx.arc(cx - r / 3, cy - r / 3, r / 3, 0, 7); ctx.fill();
}
function drawCeiling(){
  const style = currentTheme().ceilingStyle;
  ctx.fillStyle = C().steelLo;
  ctx.fillRect(WALL, HUD_H, W - 2 * WALL, 4);
  if (style === 'laser'){
    ctx.fillStyle = C().steel;
    for(let sx = WALL; sx + 10 <= W - WALL; sx += 16) ctx.fillRect(sx, HUD_H + 4, 10, 5);
    const glow = 0.6 + Math.sin(time * 8) * 0.4;
    ctx.fillStyle = `rgba(255,61,110,${glow})`;
    ctx.fillRect(WALL, HUD_H + 9, W - 2 * WALL, 2);
    return;
  }
  if (style === 'icicles'){
    ctx.fillStyle = C().steel;
    for(let sx = WALL; sx + 14 <= W - WALL + 13; sx += 14){
      const len = 10 + (Math.floor(sx / 14) % 2) * 5;
      ctx.beginPath();
      ctx.moveTo(sx, HUD_H + 4); ctx.lineTo(Math.min(sx + 7, W - WALL), HUD_H + 4 + len); ctx.lineTo(Math.min(sx + 14, W - WALL), HUD_H + 4);
      ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = 'rgba(232,248,255,0.5)';
    ctx.fillRect(WALL, HUD_H + 4, W - 2 * WALL, 1);
    return;
  }
  if (style === 'obsidian'){
    ctx.fillStyle = '#1a0e0a';
    for(let sx = WALL; sx + 16 <= W - WALL + 15; sx += 16){
      const len = 8 + (Math.floor(sx / 16) % 3) * 4;
      ctx.beginPath();
      ctx.moveTo(sx, HUD_H + 4); ctx.lineTo(Math.min(sx + 8, W - WALL), HUD_H + 4 + len); ctx.lineTo(Math.min(sx + 16, W - WALL), HUD_H + 4);
      ctx.closePath(); ctx.fill();
    }
    const drip = 0.4 + Math.sin(time * 3) * 0.3;
    ctx.fillStyle = `rgba(255,110,40,${drip})`;
    for(let sx = WALL + 6; sx + 2 <= W - WALL; sx += 22) ctx.fillRect(sx, HUD_H + 4, 2, 6 + Math.sin(time * 2 + sx) * 3);
    return;
  }
  ctx.fillStyle = C().steel;
  for(let sx = WALL; sx + 12 <= W - WALL + 11; sx += 12){
    ctx.beginPath();
    ctx.moveTo(sx, HUD_H + 4); ctx.lineTo(Math.min(sx + 6, W - WALL), HUD_H + 14); ctx.lineTo(Math.min(sx + 12, W - WALL), HUD_H + 4);
    ctx.closePath(); ctx.fill();
  }
}
function drawPlayer(){
  if(player.inv > 0 && Math.floor(time * 14) % 2 === 0) return;
  let map = SPR.stand;
  if(!player.stand) map = SPR.fall;
  else if(player.moving) map = (Math.floor(player.animT / .12) % 2 === 0) ? SPR.run1 : SPR.run2;
  drawSprite(map, player.x, player.y, player.face < 0, 1);
}
function drawHUD(){

  ctx.fillRect(0, 0, W, HUD_H);
  ctx.fillStyle = C().hudLine;
  ctx.fillRect(0, HUD_H - 2, W, 2);

  for(let i = 0; i < MAX_HP; i++){
    ctx.fillStyle = i < player.hp ? C().hpOn : C().hpOff;
    ctx.fillRect(8 + i * 10, 8, 7, 13);

  ctx.fillStyle = C().gold;

  ctx.textAlign = 'left';
}
function centerText(txt, y, font, color){

  ctx.font = font;
  ctx.fillStyle = color;
  ctx.fillText(txt, W / 2, y);

const MUTE_BTN = { x: W - 32, y: H - 32, w: 24, h: 24 };
function drawMuteButton(){

  ctx.strokeStyle = C().text;
  ctx.lineWidth = 1.5;

  ctx.closePath(); ctx.fill();

    ctx.beginPath(); ctx.arc(sx + 6, cy, 4, -0.7, 0.7); ctx.stroke();

  } else {

    ctx.moveTo(sx + 3, cy - 6); ctx.lineTo(sx + 11, cy + 6);

function draw(){
  drawWalls();
  if (state === 'play' && currentTheme().id === 'city') drawCityAmbience(1/120);
  if (state === 'play' && currentTheme().id === 'jungle') drawJungleAmbience(1/120);
  if (state === 'play' && currentTheme().id === 'scifi') drawScifiAmbience(1/120);
  if (state === 'play' && currentTheme().id === 'ice') drawIceAmbience(1/120);
  if (state === 'play' && currentTheme().id === 'lava') drawLavaAmbience(1/120);
  if(state === 'menu'){ drawMenu(); drawMuteButton(); return; }
  for(const p of plats) drawPlat(p);
  for(const p of plats) if(p.heart) drawHeart(p);
  for(const p of plats) if(p.coin) drawCoin(p);
  for(const f of fliers) drawFlier(f);
  drawPlayer();
  drawCeiling();
  for(const fa of fallers) drawFaller(fa);
  drawHUD();
  if (bannerT > 0 && state === 'play'){
    const theme = THEMES[lastThemeIndex];
    const alpha = Math.min(1, bannerT / 0.5, (2.5 - bannerT) > 2 ? 1 : (2.5 - bannerT) / 0.5);
    ctx.fillStyle = `rgba(20,16,32,${0.6 * Math.min(1, alpha + 0.3)})`;
    ctx.fillRect(0, 280, W, 60);
    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
    centerText(theme.banner, 316, 'bold 24px Consolas,monospace', C().gold);
    ctx.globalAlpha = 1;
  }
  if (hasWon && state === 'play') drawWinCelebration();
  if(state === 'over') drawOver();
  drawMuteButton();
}
function drawWinCelebration(){
  ctx.fillStyle = 'rgba(20,10,6,0.5)';
  ctx.fillRect(0, 0, W, H);
  const open = Math.min(1, winT / 0.8);
  const cx = W / 2, cy = 260;
  ctx.fillStyle = '#4a2e18';
  ctx.fillRect(cx - 22, cy, 44, 24);
  ctx.fillStyle = '#ffd75e';
  ctx.fillRect(cx - 22, cy + 10, 44, 3);
  ctx.save();
  ctx.translate(cx - 22, cy);
  ctx.rotate(-open * 0.9);
  ctx.fillStyle = '#3a2412';
  ctx.fillRect(0, -18, 44, 18);
  ctx.restore();
  if (open > 0.5){
    const glow = 0.5 + Math.sin(time * 10) * 0.3;
    ctx.fillStyle = `rgba(255,220,120,${glow})`;
    ctx.beginPath(); ctx.arc(cx, cy - 6, 16 * open, 0, 7); ctx.fill();
  }
  if (winT > 0.9){
    const bob = Math.sin(time * 4) * 4;
    centerText('全 破 ！', 200 + bob, 'bold 34px Consolas,monospace', '#ffd75e');
  }
}

// ---- 輸入 ----
const keys = { left: false, right: false };
const touchSides = new Map();   // pointerId -> 'left' | 'right'
function inputDir(){
  let d = 0;
  if(keys.left) d--;
  if(keys.right) d++;
  let tl = false, tr = false;
  for(const s of touchSides.values()){ if(s === 'left') tl = true; else tr = true; }
  if(tl) d--;
  if(tr) d++;
  return Math.max(-1, Math.min(1, d));
}
function tryStart(){
  if(state === 'menu' || (state === 'over' && time - overAt > .7)){
    reset(); state = 'play'; snd.start(); music.play(THEMES[0].id);
  }
}
addEventListener('keydown', e => {
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  initAudio();
  if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
  if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
  if(!e.repeat) tryStart();
});
addEventListener('keyup', e => {
  if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
  if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});
function hitMuteButton(e){
  const r = cv.getBoundingClientRect();
  const x = (e.clientX - r.left) * (W / r.width);
  const y = (e.clientY - r.top) * (H / r.height);
  const dx = x - (MUTE_BTN.x + MUTE_BTN.w / 2), dy = y - (MUTE_BTN.y + MUTE_BTN.h / 2);
  const rad = MUTE_BTN.w / 2 + 4;
  return dx * dx + dy * dy <= rad * rad;
}
wrap.addEventListener('pointerdown', e => {
  e.preventDefault();
  initAudio();
  if(hitMuteButton(e)){ music.setEnabled(!music.enabled); return; }
  if(state !== 'play'){ tryStart(); return; }
  touchSides.set(e.pointerId, e.clientX < innerWidth / 2 ? 'left' : 'right');
});
function releasePointer(e){ touchSides.delete(e.pointerId); }
wrap.addEventListener('pointerup', releasePointer);
wrap.addEventListener('pointercancel', releasePointer);
wrap.addEventListener('contextmenu', e => e.preventDefault());

// ---- 主迴圈（固定步長，畫面更穩定）----
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  let dt = (now - last) / 1000;
  last = now;
  if(dt > .1) dt = .1;
  if(state === 'play'){
    acc += dt;
    const step = 1 / 120;
    let n = 0;
    while(acc >= step && n < 24 && state === 'play'){ update(step); acc -= step; n++; }
  } else {
    time += dt;
  }
  draw();
}
reset();
state = 'menu';
music.play('menu');
requestAnimationFrame(frame);
</script>
</html>
